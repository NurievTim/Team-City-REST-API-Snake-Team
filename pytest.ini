[pytest]
pythonpath = .
env_files =
    .env
markers =
    # Уровни тестирования (Пирамида)
    smoke: Критичные тесты для быстрой проверки
    integration: Интеграционные тесты API
    e2e: Сквозные сценарии с несколькими сервисами

    # Функциональные модули (по разделам плана)
    builds: Тесты эндпоинтов сборок и очереди
    projects: Тесты проектов, конфигураций и VCS roots
    agents: Тесты агентов и пулов
    users: Тесты пользователей, групп, токенов
    rbac: Тесты ролевой модели
    vcs_root: Тесты конфигурации VCS
    server: Тесты сервера и аудита
    edge: Edge cases и негативные проверки
